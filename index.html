<style>
:root{
  /* Identidade Cockpit — Pantone 7547 C (principal) e Pantone 290 C (apoio) */
  --navy:#131E29;
  --navy-800:#1A2938;
  --navy-900:#0D141C;
  --blue:#203346;
  --blue-600:#131E29;
  --blue-light:#E3F0F7;
  --sky:#B9D9EB;
  --sky-tint:#EBF4F9;
  --sky-deep:#3385B2;
  --sky-deep-light:#4D9ECC;
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --surface-alt:#F6F8FA;
  --border:#E4E9EF;
  --text:#1B2733;
  --text-muted:#64748B;
  --text-faint:#94A3B8;
  --success:#12B76A;
  --success-light:#E7F9F1;
  --warning:#F79009;
  --warning-light:#FEF3E2;
  --danger:#F04438;
  --danger-light:#FDEDEC;
  --gold:var(--sky-deep);
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 2px rgba(19,30,41,.06);
  --shadow-md:0 4px 16px rgba(19,30,41,.08);
  --shadow-lg:0 12px 32px rgba(19,30,41,.16);
  --ease:cubic-bezier(.22,1,.36,1);
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;}
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
h1,h2,h3,h4,.font-display{font-family:'Poppins',system-ui,sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#C7D2E3;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

#app{display:flex;height:100vh;width:100vw;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:230px;
  min-width:230px;
  background:linear-gradient(180deg,var(--navy-900) 0%, var(--navy) 100%);
  color:#fff;
  display:flex;
  flex-direction:column;
  padding:22px 14px;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:4px 8px 22px 8px;
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--sky-deep),var(--sky-deep-light));
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins';font-weight:800;color:var(--navy-900);font-size:15px;
  flex-shrink:0;
}
.brand-text{line-height:1.1;}
.brand-text .t1{font-family:'Poppins';font-weight:800;font-size:15px;letter-spacing:.2px;}
.brand-text .t2{font-size:10.5px;color:#9db4d6;letter-spacing:.8px;text-transform:uppercase;}

.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:10px;
  color:#b9c8e0;font-size:13.5px;font-weight:600;
  background:transparent;border:none;text-align:left;width:100%;
  transition:background .15s, color .15s;
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(185,217,235,.16);color:#fff;box-shadow:inset 0 0 0 1px rgba(185,217,235,.4);}
.nav-item.active svg{opacity:1;}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:20px;
}
.nav-section-label{
  font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#5f7796;
  margin:16px 12px 4px;font-weight:700;
}
.sidebar-footer{
  margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px;padding-left:8px;
}
.avatar-sm{
  width:30px;height:30px;border-radius:50%;background:var(--blue);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.sidebar-footer .who{font-size:12.5px;font-weight:700;color:#fff;}
.sidebar-footer .role{font-size:10.5px;color:#9db4d6;}
.sidebar-powered{
  display:flex;align-items:center;gap:6px;padding:12px 8px 2px;margin-top:8px;
  font-size:9.5px;color:#7891ac;font-weight:600;
}
.sidebar-powered img{height:11px;width:auto;opacity:.8;filter:brightness(0) invert(1);}
.sidebar-powered .sp-sep{opacity:.5;}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;}
.topbar{
  height:66px;min-height:66px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 22px;
}
.page-title{font-size:18px;font-weight:800;font-family:'Poppins';margin-right:6px;white-space:nowrap;}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;width:260px;
}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;width:100%;color:var(--text);}
.search-box svg{width:15px;height:15px;color:var(--text-faint);flex-shrink:0;}
.group-filter{
  border:1px solid var(--border);background:var(--sky-tint);color:var(--sky-deep);border-radius:9px;
  padding:8px 12px;font-size:12.5px;font-weight:700;outline:none;max-width:200px;
}
.topbar-spacer{flex:1;}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:10px;border:1px solid var(--border);background:var(--surface);
  padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);
  white-space:nowrap;transition:all .15s;
}
.btn:hover{border-color:#c9d5e8;background:#fafbfe;}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(47,111,237,.35);}
.btn-primary:hover{background:var(--blue-600);border-color:var(--blue-600);}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--bg);}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
.btn-success{background:var(--success);border-color:var(--success);color:#fff;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-wpp{background:#1FAA57;border-color:#1FAA57;color:#fff;box-shadow:0 2px 8px rgba(31,170,87,.3);}
.btn-wpp:hover{background:#199049;}
.icon-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;
}
.icon-btn:hover{background:var(--bg);}
.icon-btn svg{width:16px;height:16px;}

.view{flex:1;min-height:0;overflow:hidden;display:none;}
.view.active{display:flex;flex-direction:column;}

/* filter bar */
.filterbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface);
}
.filterbar select, .filterbar input[type=date]{
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12.5px;color:var(--text);background:var(--bg);
  outline:none;
}
.filter-clear{font-size:12px;color:var(--blue);font-weight:700;background:none;border:none;padding:6px 4px;}

/* ===== KANBAN ===== */
.kanban-wrap{flex:1;min-height:0;overflow-x:auto;overflow-y:hidden;padding:16px 22px;display:flex;gap:14px;align-items:flex-start;background:var(--bg);}
.kanban-col{
  min-width:272px;max-width:272px;background:#EDF1F9;border-radius:var(--radius-md);
  display:flex;flex-direction:column;max-height:100%;
}
.kanban-col.drag-over{outline:2px dashed var(--blue);outline-offset:-2px;background:#e2ebfc;}
.kanban-col-head{
  padding:12px 12px 8px;display:flex;align-items:center;gap:8px;
}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.col-title{font-size:12.5px;font-weight:800;font-family:'Poppins';flex:1;letter-spacing:.2px;}
.col-count{font-size:11px;font-weight:700;color:var(--text-muted);background:#fff;border-radius:20px;padding:1px 8px;}
.col-sum{font-size:11px;color:var(--text-muted);padding:0 12px 10px;font-weight:600;}
.kanban-cards{flex:1;overflow-y:auto;padding:2px 8px 10px;display:flex;flex-direction:column;gap:8px;min-height:40px;}

.card{
  background:var(--surface);border-radius:var(--radius-sm);padding:11px 12px;
  border:1px solid var(--border);box-shadow:var(--shadow-sm);cursor:grab;
  transition:box-shadow .15s, transform .1s;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.card.dragging{opacity:.4;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.card-name{font-size:13px;font-weight:700;color:var(--text);}
.card-origin{font-size:9.5px;font-weight:700;color:var(--blue);background:var(--blue-light);padding:2px 6px;border-radius:6px;white-space:nowrap;}
.card-sub{font-size:11.5px;color:var(--text-muted);margin-top:3px;}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
.card-premium{font-size:12px;font-weight:800;color:var(--navy);font-family:'Poppins';}
.card-owner{
  width:22px;height:22px;border-radius:50%;background:var(--navy-800);color:#fff;
  font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.card-flag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;margin-top:7px;padding:2px 7px;border-radius:6px;}
.flag-red{background:var(--danger-light);color:var(--danger);}
.flag-yellow{background:var(--warning-light);color:#b5750a;}
.flag-green{background:var(--success-light);color:var(--success);}

/* ===== Scrollable generic content page ===== */
.page-scroll{flex:1;overflow-y:auto;padding:22px;}

/* ===== DASHBOARD ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-sm);}
.kpi-label{font-size:11.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
.kpi-value{font-family:'Poppins';font-size:24px;font-weight:800;color:var(--navy);margin-top:8px;}
.kpi-sub{font-size:11.5px;color:var(--text-faint);margin-top:4px;font-weight:600;}
.kpi-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px;box-shadow:var(--shadow-sm);}
.panel-title{font-family:'Poppins';font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.panel-title span.tag{font-size:10.5px;font-weight:700;color:var(--text-muted);background:var(--bg);padding:3px 9px;border-radius:20px;}
.chart-box{position:relative;height:230px;}
.chart-box.tall{height:270px;}

.rank-list{display:flex;flex-direction:column;gap:10px;}
.rank-row{display:flex;align-items:center;gap:10px;}
.rank-idx{width:20px;height:20px;border-radius:6px;background:var(--blue-light);color:var(--blue);font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-name{font-size:12.5px;font-weight:700;flex:1;}
.rank-val{font-size:12px;font-weight:700;color:var(--text-muted);}

/* ===== TASKS ===== */
.task-toolbar{display:flex;gap:8px;align-items:center;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.task-cols{display:flex;gap:14px;padding:16px 22px;flex:1;overflow-x:auto;background:var(--bg);}
.task-col{min-width:280px;max-width:280px;display:flex;flex-direction:column;}
.task-col-head{font-family:'Poppins';font-size:12.5px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow-sm);}
.task-item.done{opacity:.55;}
.task-item.done .task-title{text-decoration:line-through;}
.task-title{font-size:12.5px;font-weight:700;}
.task-client{font-size:11px;color:var(--blue);font-weight:600;margin-top:3px;}
.task-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
.task-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:6px;}
.task-due{font-size:10.5px;color:var(--text-muted);font-weight:600;}
.priority-alta{background:var(--danger-light);color:var(--danger);}
.priority-media{background:var(--warning-light);color:#b5750a;}
.priority-baixa{background:#EEF1F6;color:var(--text-muted);}

/* ===== AGENDA ===== */
.agenda-toolbar{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface);}
.agenda-toolbar .seg{display:flex;background:var(--bg);border-radius:9px;padding:3px;border:1px solid var(--border);}
.seg-btn{padding:6px 13px;font-size:12px;font-weight:700;border-radius:7px;background:transparent;border:none;color:var(--text-muted);}
.seg-btn.active{background:var(--surface);color:var(--navy);box-shadow:var(--shadow-sm);}
.agenda-body{flex:1;overflow-y:auto;padding:18px 22px;}
.agenda-day-group{margin-bottom:18px;}
.agenda-day-label{font-family:'Poppins';font-weight:800;font-size:13px;color:var(--navy);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--blue-light);}
.agenda-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;box-shadow:var(--shadow-sm);}
.agenda-time{font-size:11.5px;font-weight:800;color:var(--blue);width:56px;flex-shrink:0;}
.agenda-info{flex:1;}
.agenda-info .t{font-size:12.5px;font-weight:700;}
.agenda-info .s{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* ===== RENOVACOES ===== */
.renewal-groups{display:flex;flex-direction:column;gap:20px;}
.renewal-group-title{display:flex;align-items:center;gap:9px;font-family:'Poppins';font-weight:800;font-size:14px;margin-bottom:10px;}
.renewal-dot{width:10px;height:10px;border-radius:50%;}
.renewal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.renewal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 15px;box-shadow:var(--shadow-sm);}
.renewal-card .rc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.renewal-card .rc-name{font-size:13px;font-weight:800;font-family:'Poppins';}
.renewal-card .rc-days{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.renewal-card .rc-sub{font-size:11.5px;color:var(--text-muted);margin-top:4px;}
.renewal-card .rc-premium{font-size:14px;font-weight:800;color:var(--navy);margin-top:9px;font-family:'Poppins';}
.renewal-card .rc-actions{display:flex;gap:7px;margin-top:11px;}
.renewal-card .rc-actions .btn{flex:1;justify-content:center;padding:7px;font-size:11.5px;}

/* ===== EMPTY ===== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-faint);text-align:center;}
.empty-state svg{width:44px;height:44px;margin-bottom:12px;opacity:.5;}
.empty-state .e-title{font-weight:700;color:var(--text-muted);font-size:13.5px;}
.empty-state .e-sub{font-size:12px;margin-top:4px;}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,27,49,.55);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:24px;
  opacity:0;transition:opacity .2s var(--ease);
}
.modal-overlay.active{display:flex;opacity:1;}
.modal{
  background:var(--surface);border-radius:20px;width:100%;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;
  animation:modalIn .28s var(--ease);
}
@keyframes modalIn{ from{opacity:0; transform:translateY(14px) scale(.97);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal-client{max-width:840px;max-height:88vh;}
.modal-small{max-width:460px;}
.modal-task{max-width:520px;}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,var(--navy),var(--navy-800));color:#fff;
}
.modal-head .mh-avatar{
  width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Poppins';flex-shrink:0;
}
.modal-head .mh-info{flex:1;min-width:0;}
.modal-head .mh-name{font-family:'Poppins';font-weight:800;font-size:16px;}
.modal-head .mh-sub{font-size:11.5px;color:#b9c8e0;margin-top:2px;}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.12);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.modal-close svg{width:15px;height:15px;}
.modal-body{flex:1;overflow-y:auto;padding:0;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg);}

.tabs{display:flex;gap:2px;padding:0 22px;border-bottom:1px solid var(--border);background:var(--surface);}
.tab-btn{padding:13px 4px;margin-right:20px;font-size:12.5px;font-weight:700;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-panel{display:none;padding:20px 22px;}
.tab-panel.active{display:block;}

.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;}
.field input,.field select,.field textarea{
  border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--text);
  outline:none;background:var(--bg);
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:#fff;}
.field textarea{resize:vertical;min-height:70px;font-family:inherit;}

.wpp-block{background:var(--success-light);border:1px solid #bfe9d4;border-radius:var(--radius-md);padding:14px;margin-bottom:16px;}
.wpp-block-top{display:flex;align-items:center;justify-content:between;gap:10px;margin-bottom:10px;}
.wpp-quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.wpp-chip{
  font-size:11.5px;font-weight:700;background:#fff;border:1px solid #bfe9d4;color:#0f7a45;
  padding:6px 11px;border-radius:20px;
}
.wpp-chip:hover{background:#e7f9f1;}

.hist-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.hist-item{background:var(--bg);border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
.hist-item .h-date{font-size:10.5px;color:var(--text-faint);font-weight:700;}
.hist-item .h-text{font-size:12.5px;margin-top:3px;}

.attach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.attach-item{border:1px dashed var(--border);border-radius:10px;padding:14px 10px;text-align:center;background:var(--bg);}
.attach-item svg{width:22px;height:22px;color:var(--blue);margin-bottom:6px;}
.attach-item .a-name{font-size:11px;font-weight:700;word-break:break-word;}
.attach-item .a-type{font-size:9.5px;color:var(--text-faint);margin-top:2px;}
.dropzone{
  border:2px dashed #c7d5ec;border-radius:12px;padding:22px;text-align:center;color:var(--text-muted);
  font-size:12.5px;font-weight:600;background:var(--bg);
}
.dropzone svg{width:26px;height:26px;color:var(--blue);margin-bottom:8px;}

.stage-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.stage-chip{
  font-size:11px;font-weight:700;padding:6px 11px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-muted);
}
.stage-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* toast */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy-900);color:#fff;padding:11px 20px;border-radius:11px;font-size:12.5px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .25s;z-index:200;display:flex;align-items:center;gap:8px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast svg{width:15px;height:15px;color:var(--success);flex-shrink:0;}

@media (max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .grid-3{grid-template-columns:1fr;}
  .renewal-grid{grid-template-columns:1fr;}
}

/* ===== LOGIN ===== */
#loginScreen{
  position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 20% 20%, #24384a 0%, var(--navy-900) 55%, #060a0e 100%);
  overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, rgba(185,217,235,.08) 1px, transparent 1px);
  background-size:26px 26px;opacity:.5;
}
#loginScreen::after{
  content:'';position:absolute;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle, rgba(185,217,235,.16), transparent 70%);
  top:-160px;right:-160px;pointer-events:none;
}
.login-card{
  position:relative;width:100%;max-width:380px;background:var(--surface);border-radius:20px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);padding:34px 32px 26px;
  animation:loginIn .55s var(--ease);
}
@keyframes loginIn{ from{opacity:0; transform:translateY(18px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }
.login-brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px;}
.login-brand .lb-logo{height:34px;width:auto;}
.login-brand .lb-t2{font-size:11.5px;color:var(--text-muted);font-weight:600;}
.login-brand .lb-tagline{font-size:10px;color:var(--text-faint);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.login-field{margin-bottom:13px;}
.login-field label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:5px;}
.login-field input{
  width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13.5px;
  outline:none;background:var(--bg);color:var(--text);transition:border-color .15s, box-shadow .15s;
}
.login-field input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(185,217,235,.4);}
.login-error{
  background:var(--danger-light);color:var(--danger);font-size:12px;font-weight:700;padding:9px 12px;
  border-radius:9px;margin-bottom:13px;display:none;
}
.login-error.show{display:block;animation:shake .35s;}
@keyframes shake{ 10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);} 30%,50%,70%{transform:translateX(-4px);} 40%,60%{transform:translateX(4px);} }
.login-btn{
  width:100%;padding:12px;border-radius:10px;background:var(--blue);color:#fff;border:none;
  font-size:13.5px;font-weight:800;box-shadow:0 4px 14px rgba(19,30,41,.35);margin-top:6px;
  transition:transform .12s, background .15s;
}
.login-btn:hover{background:var(--blue-600);}
.login-btn:active{transform:scale(.98);}
.login-footer{
  margin-top:20px;padding-top:16px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.login-footer img{height:14px;width:auto;opacity:.85;}
.login-footer .lf-text{font-size:10px;color:var(--text-faint);font-weight:600;letter-spacing:.2px;}

/* ===== ADMIN ===== */
.admin-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface-alt);border:1px solid var(--border);border-radius:11px;padding:4px;width:fit-content;}
.admin-tab-btn{padding:8px 16px;font-size:12.5px;font-weight:700;border-radius:8px;background:transparent;border:none;color:var(--text-muted);transition:background .15s,color .15s;}
.admin-tab-btn.active{background:var(--surface);color:var(--navy);box-shadow:var(--shadow-sm);}
.sub-pill{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.sub-pill.ok{background:var(--success-light);color:var(--success);}
.sub-pill.warn{background:var(--warning-light);color:#b5750a;}
.sub-pill.expired{background:var(--danger-light);color:var(--danger);}
.billing-row{border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;background:var(--surface);}
.billing-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.billing-row-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.billing-row-actions input{flex:1;min-width:200px;border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:12.5px;background:var(--bg);outline:none;}
.billing-row-actions input:focus{border-color:var(--blue);}
.billing-history{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:11px;color:var(--text-faint);display:flex;flex-direction:column;gap:3px;}
.admin-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.admin-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);
  background:var(--bg);padding:11px 14px;font-weight:800;border-bottom:1px solid var(--border);
}
.admin-table td{padding:12px 14px;font-size:12.5px;border-bottom:1px solid var(--border);vertical-align:middle;}
.admin-table tr:last-child td{border-bottom:none;}
.role-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;}
.role-admin{background:var(--sky-tint);color:var(--sky-deep);}
.role-corretor{background:var(--blue-light);color:var(--blue);}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.status-active{background:var(--success);}
.status-inactive{background:var(--text-faint);}
.admin-actions{display:flex;gap:6px;}

/* ===== SUBSCRIPTION BANNER ===== */
.sub-banner{
  display:flex;align-items:center;gap:10px;padding:10px 22px;font-size:12.5px;font-weight:600;
  animation:bannerIn .3s var(--ease);
}
@keyframes bannerIn{ from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);} }
.sub-banner svg{width:16px;height:16px;flex-shrink:0;}
.sub-banner span a{color:inherit;text-decoration:underline;cursor:pointer;font-weight:800;}
.sub-banner.warn{background:var(--warning-light);color:#8a5a06;}
.sub-banner.expired{background:var(--danger-light);color:var(--danger);}
.sub-banner-close{margin-left:auto;background:none;border:none;color:inherit;opacity:.6;width:20px;height:20px;flex-shrink:0;}
.sub-banner-close svg{width:12px;height:12px;}
.sub-banner-close:hover{opacity:1;}

/* ===== IMPORT/EXPORT TOOLBAR ===== */
.data-tools{display:flex;gap:6px;}
.import-option{
  display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-md);
  cursor:pointer;transition:border-color .15s, background .15s, transform .1s;margin-bottom:10px;
}
.import-option:hover{border-color:var(--blue);background:var(--sky-tint);transform:translateY(-1px);}
.import-option .io-icon{
  width:38px;height:38px;border-radius:10px;background:var(--sky-tint);color:var(--sky-deep);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.import-option .io-icon svg{width:18px;height:18px;}
.import-option .io-title{font-size:13px;font-weight:800;color:var(--text);}
.import-option .io-sub{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
/* =========================================================
   MICRO-ANIMAÇÕES GERAIS
   ========================================================= */
.view.active{animation:viewIn .28s var(--ease);}
@keyframes viewIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.card, .task-item, .agenda-item, .renewal-card, .kpi-card{ animation:itemIn .32s var(--ease) both; }
.kanban-cards .card:nth-child(1){animation-delay:.02s;} .kanban-cards .card:nth-child(2){animation-delay:.05s;}
.kanban-cards .card:nth-child(3){animation-delay:.08s;} .kanban-cards .card:nth-child(4){animation-delay:.11s;}
.kanban-cards .card:nth-child(5){animation-delay:.14s;} .kanban-cards .card:nth-child(n+6){animation-delay:.16s;}
.task-col .task-item:nth-child(1){animation-delay:.02s;} .task-col .task-item:nth-child(2){animation-delay:.06s;}
.task-col .task-item:nth-child(3){animation-delay:.1s;} .task-col .task-item:nth-child(n+4){animation-delay:.13s;}
.kpi-grid .kpi-card:nth-child(1){animation-delay:0s;} .kpi-grid .kpi-card:nth-child(2){animation-delay:.05s;}
.kpi-grid .kpi-card:nth-child(3){animation-delay:.1s;} .kpi-grid .kpi-card:nth-child(4){animation-delay:.15s;}
@keyframes itemIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

.kanban-col{transition:background .15s;}
.kpi-card, .panel, .renewal-card, .import-option{transition:box-shadow .2s var(--ease), transform .2s var(--ease);}
.kpi-card:hover{box-shadow:var(--shadow-md); transform:translateY(-2px);}
.nav-item{transition:background .18s, color .18s;}
.nav-badge{animation:badgePop .3s var(--ease);}
@keyframes badgePop{ from{transform:scale(0);} to{transform:scale(1);} }
.btn, .icon-btn, .mtab-btn, .stage-chip, .seg-btn{transition:transform .12s, background .15s, border-color .15s, color .15s, box-shadow .15s;}
.btn:active, .icon-btn:active{transform:scale(.96);}
#toast{transition:opacity .3s var(--ease), transform .3s var(--ease);}

/* =========================================================
   BARRA DE NAVEGAÇÃO MOBILE (oculta no desktop)
   ========================================================= */
.mobile-tabbar{display:none;}
.more-sheet-item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 12px;border-radius:12px;

}
.more-sheet-item:hover{background:var(--bg);}
.more-sheet-item .mtab-icon svg{width:18px;height:18px;color:var(--text-muted);}

/* =========================================================
   RESPONSIVO — MOBILE (estilo app de banco)
   ========================================================= */
@media (max-width: 860px){
  body{overflow:auto;}

  /* Modais viram bottom sheets, como em apps bancários */

  .billing-row-actions{flex-direction:column;align-items:stretch;}

  .mobile-tabbar{
    display:flex;position:fixed;left:0;right:0;bottom:0;z-index:150;
    background:var(--surface);border-top:1px solid var(--border);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 16px rgba(19,30,41,.08);
  }
  .mtab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;padding:6px 2px;border-radius:12px;color:var(--text-faint);
  }
  .mtab-btn .mtab-icon svg{width:20px;height:20px;}
  .mtab-btn .mtab-label{font-size:9.5px;font-weight:700;}
  .mtab-btn.active{color:var(--blue);}
  .mtab-btn.active .mtab-icon{transform:translateY(-1px);}
  .mtab-btn:active{transform:scale(.94);}
}
@media (max-width: 420px){
  .kpi-grid{grid-template-columns:1fr;}
}

<script>
/* =========================================================
   PARCER CRM — DATA LAYER
   ========================================================= */
const STAGES = [
  {id:'lead',        name:'Lead Recebido',      color:'#94A3B8'},
  {id:'contato',      name:'Primeiro Contato',   color:'#60A5FA'},
  {id:'cotacao',      name:'Em Cotação',         color:'#3385B2'},
  {id:'negociacao',   name:'Em Negociação',      color:'#8B5CF6'},
  {id:'aguardando',   name:'Aguardando Cliente', color:'#F79009'},
  {id:'proposta',     name:'Proposta Enviada',   color:'#8B6F3E'},
  {id:'fechado',      name:'Fechado',            color:'#12B76A'},
  {id:'perdido',      name:'Perdido',            color:'#F04438'},
  {id:'renovacao',    name:'Renovação',          color:'#0EA5E9'},
  {id:'sinistro',     name:'Sinistro',           color:'#EF4444'},
  {id:'posvenda',     name:'Pós-venda',          color:'#14B8A6'},
];

const QUICK_MSGS = [
  {id:'docs',    label:'Solicitar documentos', text:'Olá {nome}, tudo bem? Para darmos andamento à sua proposta, poderia nos enviar os documentos pendentes (RG/CNH e comprovante de residência)? Obrigado(a)!'},
  {id:'proposta',label:'Enviar proposta',       text:'Olá {nome}! Sua proposta de seguro está pronta. Em instantes envio o PDF por aqui para sua análise. Qualquer dúvida estou à disposição.'},
  {id:'cobrar',  label:'Cobrar retorno',        text:'Oi {nome}, passando para saber se conseguiu analisar nossa última mensagem. Fico no aguardo do seu retorno para seguirmos com o processo.'},
  {id:'renov',   label:'Renovação próxima',     text:'Olá {nome}, seu seguro está próximo da renovação. Podemos revisar as condições e garantir o melhor custo-benefício para você. Vamos conversar?'},
  {id:'obrig',   label:'Agradecimento',         text:'Muito obrigado pela confiança, {nome}! Foi um prazer ajudar você a proteger o que é importante. Estamos à disposição sempre que precisar.'},
  {id:'pos',     label:'Pós-venda',             text:'Olá {nome}! Passando para saber como está sendo sua experiência com o seguro contratado. Alguma dúvida ou precisa de suporte com algo?'},
];

const LEAD_ORIGINS = ['Indicação','Site','Instagram','WhatsApp','Renovação','Prospecção Ativa','Parceiro'];
const INSURERS = ['Porto Seguro','Bradesco Seguros','SulAmérica','Allianz','Tokio Marine','HDI Seguros','Azul Seguros','Mapfre'];
const PRODUCTS = ['Auto','Residencial','Vida','Empresarial','Saúde','Viagem','Condomínio'];
const TASK_TYPES = ['Ligação','Cotação','Retorno','Renovação','Documentação','Pós-venda'];
const PRIORITIES = ['Alta','Média','Baixa'];
const ROLES = [{id:'admin', label:'Administrador'}, {id:'corretor', label:'Corretor'}];
const SUBSCRIPTION_DAYS = 45;
const SUBSCRIPTION_WARN_DAYS = 5;
const MULTICALCULOS = [
  { id:'quiver', name:'Quiver', desc:'Multicálculo Quiver — cotação integrada com seguradoras parceiras.', url:'https://www.quiver.com.br/', color:'#3385B2' },
  { id:'agilizador', name:'Agilizador', desc:'Agilizador — multicálculo rápido para renovação e novos negócios.', url:'https://www.agilizador.com.br/', color:'#131E29' },
];

function groupById(id){ return DB.groups.find(g=>g.id===id); }
function ownersForGroup(groupId){
  return DB.users.filter(u=>u.role==='corretor' && u.groupId===groupId && u.active).map(u=>u.name);
}
function daysLeftForGroup(groupId){
  const g = groupById(groupId);
  if(!g) return null;
  return daysUntil(g.subscriptionActiveUntil);
}
function subscriptionStatus(groupId){
  const d = daysLeftForGroup(groupId);
  if(d===null) return {label:'—', state:'ok', days:null};
  if(d<0) return {label:'Vencida há '+Math.abs(d)+'d', state:'expired', days:d};
  if(d<=SUBSCRIPTION_WARN_DAYS) return {label:'Vence em '+d+'d', state:'warn', days:d};
  return {label:d+'d restantes', state:'ok', days:d};
}

function seedGroups(){
  return [
    { id:uid('grp'), name:'Parcer Seguros', createdAt:todayISO(-120), subscriptionActiveUntil:todayISO(40), paymentLink:'', paymentHistory:[{date:todayISO(-5), note:'Pagamento confirmado — ciclo renovado por 45 dias.'}] },
    { id:uid('grp'), name:'Vértice Corretora de Seguros', createdAt:todayISO(-80), subscriptionActiveUntil:todayISO(3), paymentLink:'', paymentHistory:[{date:todayISO(-42), note:'Pagamento confirmado — ciclo renovado por 45 dias.'}] },
  ];
}

function seedUsers(groups){
  const g1 = groups[0].id, g2 = groups[1].id;
  return [
    { id:uid('usr'), name:'Administrador Geral', email:'admin@parcerseguros.com.br', password:'admin123', role:'admin', groupId:null, active:true, createdAt:todayISO(-120) },
    { id:uid('usr'), name:'Marina Costa', email:'marina@parcerseguros.com.br', password:'corretor123', role:'corretor', groupId:g1, active:true, createdAt:todayISO(-100) },
    { id:uid('usr'), name:'Rafael Lima', email:'rafael@parcerseguros.com.br', password:'corretor123', role:'corretor', groupId:g1, active:true, createdAt:todayISO(-60) },
    { id:uid('usr'), name:'Beatriz Alves', email:'beatriz@vertice.com.br', password:'corretor123', role:'corretor', groupId:g2, active:true, createdAt:todayISO(-80) },
  ];
}

function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function todayISO(offset=0){ const d=new Date(); d.setDate(d.getDate()+offset); return d.toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function fmtMoney(v){ return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}); }
function daysUntil(iso){ const d1=new Date(todayISO()); const d2=new Date(iso); return Math.round((d2-d1)/86400000); }
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function stageOf(id){ return STAGES.find(s=>s.id===id); }

function seedClients(groups){
  const names = ['Carlos Eduardo Menezes','Fernanda Rocha Silva','Paulo Henrique Duarte','Juliana Marques Torres',
    'Ricardo Nogueira Alves','Camila Ferreira Dias','Bruno Cesar Martins','Larissa Prado Souza',
    'André Luiz Barbosa','Patrícia Gomes Ramos','Eduardo Santos Vieira','Renata Cardoso Lopes',
    'Marcelo Andrade Reis','Vanessa Lima Correia','Felipe Augusto Castro','Tatiane Borges Nunes',
    'Diego Fonseca Pinto','Aline Cristina Rezende','Gustavo Henrique Farias','Priscila Moura Teixeira'];
  const stagesCycle = ['lead','lead','contato','contato','cotacao','cotacao','negociacao','aguardando','proposta','proposta','fechado','fechado','fechado','fechado','perdido','perdido','renovacao','renovacao','sinistro','posvenda'];
  const cities = ['Brasília, DF','São Paulo, SP','Goiânia, GO','Belo Horizonte, MG','Rio de Janeiro, RJ','Curitiba, PR'];
  const histories = [
    'Cliente possui seguro Porto. Avaliar portabilidade.',
    'Retornar contato em 10 dias.',
    'Solicitou proposta empresarial.',
    'Cliente pediu desconto, aguardando aprovação da seguradora.',
    'Enviado comparativo entre 3 seguradoras.',
    'Cliente muito satisfeito com atendimento anterior.'
  ];
  // Distribui a base entre as corretoras seedadas, com donos reais (usuários do grupo)
  const g1 = groups[0].id, g2 = groups[1].id;
  const ownersG1 = ['Marina Costa','Rafael Lima'];
  const ownersG2 = ['Beatriz Alves'];
  const clients = names.map((name,i)=>{
    const stage = stagesCycle[i%stagesCycle.length];
    const premium = Math.round(1200+Math.random()*8000);
    const closedOffset = -Math.floor(Math.random()*150);
    const renewOffsetPool = [4,6,9,13,14,18,25,28,40,90,-10,120];
    const renewOffset = renewOffsetPool[i%renewOffsetPool.length];
    const inG2 = i%4===3; // ~1/4 dos clientes de demonstração pertence à segunda corretora
    const groupId = inG2 ? g2 : g1;
    const owner = inG2 ? ownersG2[i%ownersG2.length] : ownersG1[i%ownersG1.length];
    return {
      id: uid('cli'),
      groupId, owner,
      name, cpfCnpj:'000.'+(100+i)+'.000-'+(10+i%90),
      phone:'(61) 9'+String(8000+i*137).padStart(4,'0')+'-'+String(1000+i*77).padStart(4,'0'),
      whatsapp:'5561'+String(90000+i*137).padStart(9,'0'),
      email: name.toLowerCase().replace(/ /g,'.')+'@email.com',
      birthDate:'19'+(70+i%25)+'-0'+((i%9)+1)+'-1'+(i%9),
      profession:['Empresário','Autônomo','Servidor Público','Advogado(a)','Médico(a)','Engenheiro(a)','Comerciante'][i%7],
      city: cities[i%cities.length],
      leadOrigin: LEAD_ORIGINS[i%LEAD_ORIGINS.length],
      insurer: INSURERS[i%INSURERS.length],
      product: PRODUCTS[i%PRODUCTS.length],
      policyNumber: (stage==='fechado'||stage==='renovacao'||stage==='sinistro'||stage==='posvenda') ? ('AP-'+(58000+i)) : '',
      premium,
      effectiveDate: (stage==='fechado'||stage==='renovacao'||stage==='sinistro'||stage==='posvenda') ? todayISO(closedOffset) : '',
      renewalDate: (stage==='fechado'||stage==='renovacao'||stage==='sinistro'||stage==='posvenda') ? todayISO(renewOffset) : '',
      closedDate: (stage==='fechado'||stage==='perdido') ? todayISO(closedOffset) : '',
      stage,
      history:[{date:todayISO(closedOffset-2), text:histories[i%histories.length]}],
      attachments: (i%3===0) ? [{name:'RG_'+name.split(' ')[0]+'.pdf', type:'RG'}] : [],
      createdAt: todayISO(closedOffset-5)
    };
  });
  return clients;
}

function seedTasks(clients){
  const tasks = [];
  const sample = clients.slice(0,14);
  sample.forEach((c,i)=>{
    tasks.push({
      id:uid('tsk'),
      groupId: c.groupId,
      title:[`Ligar para ${c.name.split(' ')[0]}`,`Enviar cotação`,`Cobrar retorno da proposta`,`Confirmar documentação`,`Follow-up de renovação`,`Ligação de pós-venda`][i%6],
      clientId:c.id,
      type:TASK_TYPES[i%TASK_TYPES.length],
      dueDate:todayISO(-2+i%9),
      priority:PRIORITIES[i%3],
      status: i%5===0 ? 'done' : (i%4===0 ? 'doing':'todo'),
      comments:[]
    });
  });
  return tasks;
}

let DB = { clients:[], tasks:[], users:[], groups:[] };
let FILTERS = { q:'', insurer:'', product:'', owner:'', status:'', origin:'' };
let CURRENT_VIEW = 'kanban';
let AGENDA_MODE = 'week';
let TASK_GROUP = 'status';
let CURRENT_USER = null;
let ADMIN_GROUP_FILTER = ''; // admin: '' = todas as corretoras
let ADMIN_TAB = 'usuarios';

async function loadDB(){
  try{
    const g = await window.storage.get('crm:groups', true);
    DB.groups = JSON.parse(g.value);
  }catch(e){
    DB.groups = seedGroups();
    await persistGroups();
  }
  try{
    const c = await window.storage.get('crm:clients', true);
    const t = await window.storage.get('crm:tasks', true);
    DB.clients = JSON.parse(c.value);
    DB.tasks = JSON.parse(t.value);
  }catch(e){
    DB.clients = seedClients(DB.groups);
    DB.tasks = seedTasks(DB.clients);
    await persist();
  }
  try{
    const u = await window.storage.get('crm:users', true);
    DB.users = JSON.parse(u.value);
  }catch(e){
    DB.users = seedUsers(DB.groups);
    await persistUsers();
  }
}
let saveTimer=null;
async function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{
      await window.storage.set('crm:clients', JSON.stringify(DB.clients), true);
      await window.storage.set('crm:tasks', JSON.stringify(DB.tasks), true);
    }catch(e){ console.error('storage error', e); }
  }, 150);
}
async function persistGroups(){
  try{ await window.storage.set('crm:groups', JSON.stringify(DB.groups), true); }
  catch(e){ console.error('storage error', e); }
}
async function persistUsers(){
  try{ await window.storage.set('crm:users', JSON.stringify(DB.users), true); }
  catch(e){ console.error('storage error', e); }
}

/* =========================================================
   AUTENTICAÇÃO — login por e-mail/senha (definida pelo administrador)
   ========================================================= */
async function trySavedSession(){
  try{
    const s = await window.storage.get('crm:session', false);
    const userId = JSON.parse(s.value);
    const u = DB.users.find(x=>x.id===userId && x.active);
    if(u){
      if(u.role==='corretor' && subscriptionStatus(u.groupId).state==='expired'){
        await clearSession();
        SESSION_EXPIRED_MSG = 'A assinatura da sua corretora está vencida. Fale com o administrador para renovar o acesso.';
        return false;
      }

async function doLogin(){
  const email = document.getElementById('li_email').value.trim().toLowerCase();
  const pass = document.getElementById('li_pass').value;
  const u = DB.users.find(x=>x.email.toLowerCase()===email && x.password===pass);
  const err = document.getElementById('loginError');
  if(!u){ err.textContent='E-mail ou senha inválidos.'; err.classList.add('show'); return; }
  if(!u.active){ err.textContent='Este usuário está desativado. Fale com o administrador.'; err.classList.add('show'); return; }
  if(u.role==='corretor'){
    const st = subscriptionStatus(u.groupId);
    if(st.state==='expired'){
      err.textContent='A assinatura da sua corretora está vencida. Fale com o administrador para renovar o acesso.';
      err.classList.add('show');
      return;
    }
  }
  err.classList.remove('show');
  CURRENT_USER = u;
  await saveSession(u.id);
  enterApp();
}

function logout(){
  CURRENT_USER = null;
  clearSession();
  document.getElementById('app').style.display='none';
  renderLogin();
}

function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  CURRENT_VIEW = 'kanban';
  renderSidebarBrand();
  renderSidebarFooter();
  renderSidebarPowered();
  renderNav();
  renderTopbar();
  renderMobileTabbar();
  renderBanners();
  renderKanban();
}

function renderSidebarBrand(){
  let name = 'Cockpit CRM', sub = 'Painel do Administrador';
  if(CURRENT_USER.role==='corretor'){
    const g = groupById(CURRENT_USER.groupId);
    name = g ? g.name : 'Minha Corretora';
    sub = 'CRM Corretora';
  }
  document.getElementById('sidebarBrand').innerHTML = `
    <div class="brand-mark">${name.trim()[0]||'C'}</div>
    <div class="brand-text">
      <div class="t1">${name}</div>
      <div class="t2">${sub}</div>
    </div>
  `;
}

function renderBanners(){
  const stack = document.getElementById('bannerStack');
  if(!stack) return;
  let html = '';
  if(CURRENT_USER.role==='corretor'){
    const st = subscriptionStatus(CURRENT_USER.groupId);
    if(st.state==='warn'){
      html += bannerHTML('warn', `A assinatura da sua corretora vence em ${st.days} dia(s). Fale com o administrador para renovar e evitar bloqueio de acesso.`);
    }
  }else if(CURRENT_USER.role==='admin'){
    const expiring = DB.groups.filter(g=>{ const st=subscriptionStatus(g.id); return st.state==='warn'||st.state==='expired'; });
    if(expiring.length){
      const expiredCount = expiring.filter(g=>subscriptionStatus(g.id).state==='expired').length;
      const warnCount = expiring.length - expiredCount;
      const parts = [];
      if(expiredCount) parts.push(`${expiredCount} corretora(s) com assinatura vencida`);
      if(warnCount) parts.push(`${warnCount} vencendo em breve`);
      html += bannerHTML(expiredCount?'expired':'warn', `${parts.join(' · ')}. <a onclick="goToBillingTab()">Ver cobrança</a>`);
    }
  }
  stack.innerHTML = html;
}
function bannerHTML(type, text){
  return `<div class="sub-banner ${type}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
    <span>${text}</span>
    <button class="sub-banner-close" onclick="this.parentElement.remove()">${ICONS.close}</button>
  </div>`;
}
function goToBillingTab(){
  ADMIN_TAB='cobranca';
  switchView('admin');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>${msg}`;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.remove('show'), 2400);
}

function clientsInScope(){
  if(!CURRENT_USER) return [];
  if(CURRENT_USER.role==='admin'){
    return ADMIN_GROUP_FILTER ? DB.clients.filter(c=>c.groupId===ADMIN_GROUP_FILTER) : DB.clients;
  }
  return DB.clients.filter(c=>c.groupId===CURRENT_USER.groupId);
}
function tasksInScope(){
  if(!CURRENT_USER) return [];
  const ids = new Set(clientsInScope().map(c=>c.id));
  if(CURRENT_USER.role==='admin'){
    return ADMIN_GROUP_FILTER ? DB.tasks.filter(t=>t.groupId===ADMIN_GROUP_FILTER) : DB.tasks;
  }
  return DB.tasks.filter(t=>t.groupId===CURRENT_USER.groupId || (t.clientId && ids.has(t.clientId)));
}
function filteredClients(){
  return clientsInScope().filter(c=>{
    if(FILTERS.q){
      const q=FILTERS.q.toLowerCase();
      if(!(c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q) || (c.policyNumber||'').toLowerCase().includes(q))) return false;
    }
    if(FILTERS.insurer && c.insurer!==FILTERS.insurer) return false;
    if(FILTERS.product && c.product!==FILTERS.product) return false;
    if(FILTERS.owner && c.owner!==FILTERS.owner) return false;
    if(FILTERS.status && c.stage!==FILTERS.status) return false;
    if(FILTERS.origin && c.leadOrigin!==FILTERS.origin) return false;
    return true;
  });
}

let ACTIVE_CLIENT_ID = null;

}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');

}

function onClientGroupChange(groupId){
  const sel = document.getElementById('cf_owner');

  const owners = ownersForGroup(groupId);
  sel.innerHTML = owners.length ? owners.map(o=>`<option value="${o}">${o}</option>`).join('') : '<option value="">— sem corretores neste grupo —</option>';
}

          <button class="btn btn-sm" style="margin-top:8px;" onclick="addHistory()">${ICONS.plus} Adicionar ao histórico</button>
          <div class="hist-list">
            ${(c.history&&c.history.length) ? c.history.map(h=>`<div class="hist-item"><div class="h-date">${fmtDate(h.date)}</div><div class="h-text">${h.text}</div></div>`).join('') : `<div style="font-size:12px;color:var(--text-faint);">Sem observações registradas.</div>`}
          </div>
        </div>

        <div class="tab-panel ${ACTIVE_TAB==='anexos'?'active':''}">
          <div class="dropzone" onclick="simulateUpload()">
            ${ICONS.file}
            <div>Clique para anexar PDF, CNH, RG, CRLV, propostas, contratos ou fotos</div>
          </div>
          <div class="attach-grid">
            ${(c.attachments&&c.attachments.length) ? c.attachments.map(a=>`
              <div class="attach-item">${ICONS.file}<div class="a-name">${a.name}</div><div class="a-type">${a.type}</div></div>
            `).join('') : `<div style="grid-column:1/-1;font-size:12px;color:var(--text-faint);padding-top:6px;">Nenhum arquivo anexado ainda.</div>`}
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveClient(${isNew})">${ICONS.check} ${isNew?'Adicionar Cliente':'Salvar Alterações'}</button>
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').innerHTML = html;
  window._editingStage = c.stage;
  window._editingClientId = isNew ? null : c.id;
}

function field(label,id,val,type='text',cls=''){
  return `<div class="field ${cls}"><label>${label}</label><input id="${id}" type="${type}" value="${val!==undefined&&val!==null?val:''}"/></div>`;
}
function selectField(label,id,options,val){
  return `<div class="field"><label>${label}</label><select id="${id}">${options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
}
function pickStage(btn,stage){
  document.querySelectorAll('.stage-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  window._editingStage = stage;
}

function toggleWppPanel(){
  const holder = document.getElementById('wppPanelHolder');
  if(holder.innerHTML.trim()){ holder.innerHTML=''; return; }
  const c = DB.clients.find(x=>x.id===ACTIVE_CLIENT_ID);
  holder.innerHTML = `
    <div class="wpp-block">
      <div class="wpp-block-top">
        <strong style="font-size:13px;">Conversar no WhatsApp — ${c.name.split(' ')[0]}</strong>
      </div>
      <button class="btn btn-wpp btn-sm" onclick="sendWhatsApp('${c.id}', null)">${ICONS.wpp} Abrir conversa</button>
      <div style="font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;margin-top:12px;">Mensagens rápidas</div>
      <div class="wpp-quick">
        ${QUICK_MSGS.map(m=>`<button class="wpp-chip" onclick="sendWhatsApp('${c.id}','${m.id}')">${m.label}</button>`).join('')}
      </div>
    </div>
  `;
}

function addHistory(){
  const txt = document.getElementById('cf_newhist').value.trim();
  if(!txt) return;
  const c = DB.clients.find(x=>x.id===ACTIVE_CLIENT_ID);
  if(!c) return;
  c.history.unshift({date:todayISO(), text:txt});
  persist();
  renderClientModal();
  toast('Observação adicionada ao histórico');
}

function simulateUpload(){
  const c = DB.clients.find(x=>x.id===ACTIVE_CLIENT_ID);
  if(!c) return;
  const types=['PDF','RG','CNH','CRLV','Proposta','Contrato','Foto'];
  const t = types[Math.floor(Math.random()*types.length)];
  c.attachments.push({name:`${t}_${Date.now()%10000}.pdf`, type:t});
  persist();
  renderClientModal();
  toast('Arquivo anexado com sucesso');
}

function saveClient(isNew){
  const get = id=>document.getElementById(id).value;
  const groupId = CURRENT_USER.role==='admin' ? get('cf_group') : CURRENT_USER.groupId;
  const owner = CURRENT_USER.role==='admin' ? get('cf_owner') : CURRENT_USER.name;
  const data = {
    groupId, owner,
    name:get('cf_name').trim(), cpfCnpj:get('cf_cpf'), city:get('cf_city'), phone:get('cf_phone'),
    whatsapp:get('cf_wpp').replace(/\D/g,''), email:get('cf_email'), birthDate:get('cf_birth'), profession:get('cf_prof'),
    leadOrigin:get('cf_origin'), stage:window._editingStage||'lead',
    insurer:get('cf_insurer'), product:get('cf_product'), policyNumber:get('cf_policy'),
    premium:parseFloat(get('cf_premium'))||0,
    effectiveDate:get('cf_effective'), renewalDate:get('cf_renewal'),
  };
  if(!data.name){ toast('Informe o nome do cliente'); return; }
  if(!data.groupId){ toast('Selecione a corretora do cliente'); return; }

  if(isNew){
    const c = blankClient();
    Object.assign(c, data);
    c.history = [{date:todayISO(), text:'Cliente adicionado ao funil.'}];
    DB.clients.unshift(c);
    toast('Cliente adicionado com sucesso');
  }else{
    const c = DB.clients.find(x=>x.id===ACTIVE_CLIENT_ID);
    const stageChanged = c.stage !== data.stage;
    Object.assign(c, data);
    if(stageChanged){
      c.history.unshift({date:todayISO(), text:`Movido para etapa "${stageOf(data.stage).name}".`});
      if(data.stage==='fechado' && !c.closedDate) c.closedDate = todayISO();
      if(data.stage==='perdido' && !c.closedDate) c.closedDate = todayISO();
    }
    toast('Alterações salvas');
  }
  persist();
  closeModal();
  renderNav();
  renderCurrentView();
}

function saveTask(){
  const title = document.getElementById('tf_title').value.trim();
  if(!title){ toast('Informe o título da tarefa'); return; }
  const clientId = document.getElementById('tf_client').value||null;
  const relatedClient = clientId ? DB.clients.find(x=>x.id===clientId) : null;
  const groupId = relatedClient ? relatedClient.groupId : (CURRENT_USER.role==='admin' ? (ADMIN_GROUP_FILTER||null) : CURRENT_USER.groupId);
  DB.tasks.unshift({
    id:uid('tsk'), groupId, title, clientId,
    type:document.getElementById('tf_type').value, priority:document.getElementById('tf_priority').value,
    dueDate:document.getElementById('tf_due').value||todayISO(), status:'todo', comments:[]
  });
  persist();
  closeModal();
  renderNav();
  if(CURRENT_VIEW==='tasks') renderTasks();
  toast('Tarefa criada com sucesso');
}

function getNavItems(){
  const items = [
    {id:'kanban', label:'Funil de Vendas', icon:ICONS.kanban},
    {id:'dash',   label:'Dashboard',       icon:ICONS.dash},
    {id:'tasks',  label:'Tarefas',         icon:ICONS.tasks},
    {id:'agenda', label:'Agenda Comercial',icon:ICONS.agenda},
    {id:'renew',  label:'Vigências',       icon:ICONS.renew},
  ];
  if(CURRENT_USER && CURRENT_USER.role==='admin'){
    items.push({id:'admin', label:'Administração', icon:ICONS.admin});
  }
  return items;
}

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = getNavItems().map(item=>{
    let badge='';
    if(item.id==='renew'){
      const urgent = clientsInScope().filter(c=>c.renewalDate && daysUntil(c.renewalDate)>=0 && daysUntil(c.renewalDate)<=7).length;
      if(urgent>0) badge = `<span class="nav-badge">${urgent}</span>`;
    }
    if(item.id==='tasks'){
      const pending = tasksInScope().filter(t=>t.status!=='done' && t.dueDate<=todayISO()).length;
      if(pending>0) badge = `<span class="nav-badge">${pending}</span>`;
    }
    return `<button class="nav-item ${CURRENT_VIEW===item.id?'active':''}" onclick="switchView('${item.id}')">${item.icon}<span>${item.label}</span>${badge}</button>`;
  }).join('');
  renderMobileTabbar();
}

function renderMobileTabbar(){
  const bar = document.getElementById('mobileTabbar');
  if(!bar) return;
  const items = getNavItems();
  const primary = items.slice(0,3);
  const rest = items.slice(3);
  const moreActive = rest.some(i=>i.id===CURRENT_VIEW);
  bar.innerHTML = primary.map(item=>`
    <button class="mtab-btn ${CURRENT_VIEW===item.id?'active':''}" onclick="switchView('${item.id}')">
      <span class="mtab-icon">${item.icon}</span><span class="mtab-label">${item.label.split(' ')[0]}</span>
    </button>
  `).join('') + `
    <button class="mtab-btn ${moreActive?'active':''}" onclick="openMoreSheet()">
      <span class="mtab-icon">${ICONS.plus}</span><span class="mtab-label">Mais</span>
    </button>
  `;
}

function switchView(id){
  if(id==='admin' && (!CURRENT_USER || CURRENT_USER.role!=='admin')) return;
  CURRENT_VIEW = id;
  renderNav();
  renderTopbar();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  renderCurrentView();
}

function renderTopbar(){
  const titles = {kanban:'Funil de Vendas', dash:'Dashboard Executivo', tasks:'Tarefas', agenda:'Agenda Comercial', renew:'Próximas Renovações', admin:'Administração'};
  const tb = document.getElementById('topbar');
  const showSearch = CURRENT_VIEW!=='admin' && CURRENT_VIEW!=='dash' && CURRENT_VIEW!=='agenda';
  const showGroupFilter = CURRENT_USER.role==='admin' && CURRENT_VIEW!=='admin';
  tb.innerHTML = `
    <div class="page-title">${titles[CURRENT_VIEW]}</div>
    ${showGroupFilter ? `
      <select class="group-filter" onchange="ADMIN_GROUP_FILTER=this.value; renderNav(); renderCurrentView();">
        <option value="">Todas as corretoras</option>
        ${DB.groups.map(g=>`<option value="${g.id}" ${ADMIN_GROUP_FILTER===g.id?'selected':''}>${g.name}</option>`).join('')}
      </select>
    ` : ''}
    ${showSearch ? `<div class="search-box">${ICONS.search}<input id="globalSearch" placeholder="Buscar cliente, apólice, e-mail..." value="${FILTERS.q}" oninput="FILTERS.q=this.value; renderCurrentView();"/></div>` : ''}
    <div class="topbar-spacer"></div>
    ${CURRENT_VIEW==='kanban' ? `
      <div class="data-tools">
        <button class="icon-btn" title="Baixar modelo de planilha" onclick="downloadTemplate()">${ICONS.sheet}</button>
        <button class="icon-btn" title="Importar planilha" onclick="openImportModal()">${ICONS.upload}</button>
        <button class="icon-btn" title="Exportar planilha" onclick="exportSpreadsheet()">${ICONS.download}</button>
      </div>
    ` : ''}
    ${CURRENT_VIEW==='tasks' ? `<button class="btn" onclick="openTaskModal()">${ICONS.plus} Nova Tarefa</button>` : ''}
    ${CURRENT_VIEW==='admin' && ADMIN_TAB==='usuarios' ? `<button class="btn btn-primary" onclick="openUserModal(null)">${ICONS.plus} Novo Usuário</button>` : ''}
    ${CURRENT_VIEW==='admin' && ADMIN_TAB==='corretoras' ? `<button class="btn btn-primary" onclick="openGroupModal(null)">${ICONS.plus} Nova Corretora</button>` : ''}
    ${(CURRENT_VIEW==='kanban'||CURRENT_VIEW==='renew') ? `<button class="btn btn-primary" onclick="openClientModal(null)">${ICONS.plus} Novo Cliente</button>` : ''}
  `;
}

function renderFilterBar(containerId){
  const scoped = clientsInScope();
  const insurers=[...new Set(scoped.map(c=>c.insurer))].sort();
  const products=[...new Set(scoped.map(c=>c.product))].sort();
  const owners=[...new Set(scoped.map(c=>c.owner))].sort();
  const origins=[...new Set(scoped.map(c=>c.leadOrigin))].sort();
  const html = `
    <select onchange="FILTERS.insurer=this.value; renderCurrentView();">
      <option value="">Seguradora (todas)</option>
      ${insurers.map(i=>`<option value="${i}" ${FILTERS.insurer===i?'selected':''}>${i}</option>`).join('')}
    </select>
    <select onchange="FILTERS.product=this.value; renderCurrentView();">
      <option value="">Produto (todos)</option>
      ${products.map(i=>`<option value="${i}" ${FILTERS.product===i?'selected':''}>${i}</option>`).join('')}
    </select>
    <select onchange="FILTERS.owner=this.value; renderCurrentView();">
      <option value="">Responsável (todos)</option>
      ${owners.map(i=>`<option value="${i}" ${FILTERS.owner===i?'selected':''}>${i}</option>`).join('')}
    </select>
    <select onchange="FILTERS.status=this.value; renderCurrentView();">
      <option value="">Status (todos)</option>
      ${STAGES.map(s=>`<option value="${s.id}" ${FILTERS.status===s.id?'selected':''}>${s.name}</option>`).join('')}
    </select>
    <select onchange="FILTERS.origin=this.value; renderCurrentView();">
      <option value="">Origem (todas)</option>
      ${origins.map(i=>`<option value="${i}" ${FILTERS.origin===i?'selected':''}>${i}</option>`).join('')}
    </select>
    <button class="filter-clear" onclick="clearFilters()">Limpar filtros</button>
  `;
  document.getElementById(containerId).innerHTML = html;
}
function clearFilters(){
  FILTERS = { q:'', insurer:'', product:'', owner:'', status:'', origin:'' };
  renderTopbar();
  renderCurrentView();
}

function renderCurrentView(){
  if(CURRENT_VIEW==='kanban') renderKanban();
  if(CURRENT_VIEW==='dash') renderDashboard();
  if(CURRENT_VIEW==='tasks') renderTasks();
  if(CURRENT_VIEW==='agenda') renderAgenda();
  if(CURRENT_VIEW==='renew') renderRenewals();
  if(CURRENT_VIEW==='admin') renderAdmin();
}

/* =========================================================
   KANBAN
   ========================================================= */
function renderKanban(){
  renderFilterBar('kanbanFilterBar');
  const clients = filteredClients();
  const wrap = document.getElementById('kanbanWrap');
  wrap.innerHTML = STAGES.map(stage=>{
    const items = clients.filter(c=>c.stage===stage.id);
    const sum = items.reduce((a,c)=>a+(c.premium||0),0);
    return `
      <div class="kanban-col" data-stage="${stage.id}" ondragover="onColDragOver(event,this)" ondragleave="this.classList.remove('drag-over')" ondrop="onColDrop(event,'${stage.id}')">
        <div class="kanban-col-head">
          <span class="col-dot" style="background:${stage.color}"></span>
          <span class="col-title">${stage.name}</span>
          <span class="col-count">${items.length}</span>
        </div>
        <div class="col-sum">${sum>0?fmtMoney(sum)+' em prêmios':'—'}</div>
        <div class="kanban-cards">
          ${items.length ? items.map(c=>cardHTML(c)).join('') : `<div style="text-align:center;color:var(--text-faint);font-size:11.5px;padding:14px 6px;">Sem clientes</div>`}
        </div>
      </div>
    `;
  }).join('');
}

function cardHTML(c){
  let flag='';
  if(c.renewalDate){
    const d=daysUntil(c.renewalDate);
    if(d>=0 && d<=7) flag=`<div class="card-flag flag-red">Renova em ${d}d</div>`;
    else if(d>7 && d<=15) flag=`<div class="card-flag flag-yellow">Renova em ${d}d</div>`;
    else if(d>15 && d<=30) flag=`<div class="card-flag flag-green">Renova em ${d}d</div>`;
  }
  return `
    <div class="card" draggable="true" data-id="${c.id}" ondragstart="onCardDragStart(event,'${c.id}')" ondragend="this.classList.remove('dragging')" onclick="openClientModal('${c.id}')">
      <div class="card-top">
        <span class="card-name">${c.name}</span>
        <span class="card-origin">${c.leadOrigin}</span>
      </div>
      <div class="card-sub">${c.product} · ${c.insurer}</div>
      <div class="card-meta">
        <span class="card-premium">${c.premium?fmtMoney(c.premium):'—'}</span>
        <span class="card-owner" title="${c.owner}">${initials(c.owner)}</span>
      </div>
      ${flag}
    </div>
  `;
}

/* =========================================================
   DASHBOARD
   ========================================================= */
let CHARTS = {};
function destroyCharts(){ Object.values(CHARTS).forEach(c=>c && c.destroy()); CHARTS={}; }

function renderDashboard(){
  const clients = filteredClients();
  const closed = clients.filter(c=>c.stage==='fechado');
  const lost = clients.filter(c=>c.stage==='perdido');
  const open = clients.filter(c=>!['fechado','perdido'].includes(c.stage));
  const totalClosedValue = closed.reduce((a,c)=>a+(c.premium||0),0);
  const totalLostValue = lost.reduce((a,c)=>a+(c.premium||0),0);
  const conversion = (closed.length+lost.length)>0 ? Math.round(closed.length/(closed.length+lost.length)*100) : 0;

  // rankings
  const byInsurer = {}; closed.forEach(c=>byInsurer[c.insurer]=(byInsurer[c.insurer]||0)+c.premium);
  const topInsurers = Object.entries(byInsurer).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const byProduct = {}; closed.forEach(c=>byProduct[c.product]=(byProduct[c.product]||0)+1);

function kpi(label,value,sub,color,bg,icon){
  return `<div class="kpi-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div class="kpi-label">${label}</div>
      <div class="kpi-icon" style="background:${bg};color:${color}">${icon}</div>
    </div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}
function animateCounters(){
  const els = document.querySelectorAll('.big-counter[data-count]');
  els.forEach(el=>{
    const target = parseFloat(el.getAttribute('data-count'))||0;
    const isMoney = el.getAttribute('data-money')==='1';
    const dur = 700;
    const t0 = performance.now();
    function step(t){
      const p = Math.min(1,(t-t0)/dur);
      const eased = 1-Math.pow(1-p,3);
      const val = target*eased;
      el.textContent = isMoney ? fmtMoney(val) : Math.round(val).toLocaleString('pt-BR');
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function rankRow(i,name,val){
  return `<div class="rank-row"><span class="rank-idx">${i+1}</span><span class="rank-name">${name}</span><span class="rank-val">${val}</span></div>`;
}
function emptyRank(){ return `<div style="font-size:12px;color:var(--text-faint);">Sem dados suficientes ainda.</div>`; }

function lastMonths(n){
  const arr=[];
  const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    arr.push({label:d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''), y:d.getFullYear(), m:d.getMonth()});
  }
  return arr;
}

function drawCharts(clients, closed, lost){
  const months = lastMonths(6);
  const gridColor = '#EEF2F8';
  Chart.defaults.font.family = "'Inter',sans-serif";
  Chart.defaults.font.size = 11.5;
  Chart.defaults.color = '#64748B';

  // Fechados x Perdidos
  const closedByMonth = months.map(mo=>closed.filter(c=>c.closedDate && new Date(c.closedDate).getFullYear()===mo.y && new Date(c.closedDate).getMonth()===mo.m).length);
  const lostByMonth = months.map(mo=>lost.filter(c=>c.closedDate && new Date(c.closedDate).getFullYear()===mo.y && new Date(c.closedDate).getMonth()===mo.m).length);
  CHARTS.closedLost = new Chart(document.getElementById('chartClosedLost'), {
    type:'bar',
    data:{ labels:months.map(m=>m.label), datasets:[
      {label:'Fechados', data:closedByMonth, backgroundColor:'#12B76A', borderRadius:6, barPercentage:.6},
      {label:'Perdidos', data:lostByMonth, backgroundColor:'#F04438', borderRadius:6, barPercentage:.6},
    ]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom', labels:{usePointStyle:true, boxWidth:8}}}, scales:{y:{beginAtZero:true, grid:{color:gridColor}, ticks:{stepSize:1}}, x:{grid:{display:false}}}}
  });

  // Producao mensal (soma premio fechado)
  const producao = months.map(mo=>closed.filter(c=>c.closedDate && new Date(c.closedDate).getFullYear()===mo.y && new Date(c.closedDate).getMonth()===mo.m).reduce((a,c)=>a+c.premium,0));
  CHARTS.producao = new Chart(document.getElementById('chartProducao'), {
    type:'line',
    data:{ labels:months.map(m=>m.label), datasets:[{label:'Produção', data:producao, borderColor:'#131E29', backgroundColor:'rgba(185,217,235,.35)', fill:true, tension:.35, pointRadius:3, pointBackgroundColor:'#131E29'}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:gridColor}, ticks:{callback:v=>'R$'+(v/1000)+'k'}}, x:{grid:{display:false}}}}
  });

  // Conversao por produto
  const prods = [...new Set(clients.map(c=>c.product))];
  const convProduto = prods.map(p=>{
    const cl=clients.filter(c=>c.product===p && c.stage==='fechado').length;
    const ls=clients.filter(c=>c.product===p && c.stage==='perdido').length;
    return (cl+ls)>0 ? Math.round(cl/(cl+ls)*100) : 0;
  });
  CHARTS.convProduto = new Chart(document.getElementById('chartConvProduto'), {
    type:'bar',
    data:{ labels:prods, datasets:[{label:'Conversão %', data:convProduto, backgroundColor:'#8B5CF6', borderRadius:6, barPercentage:.55}]},
    options:{indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true, max:100, grid:{color:gridColor}, ticks:{callback:v=>v+'%'}}, y:{grid:{display:false}}}}
  });

  // Conversao por origem
  const origins = [...new Set(clients.map(c=>c.leadOrigin))];
  const convOrigem = origins.map(o=>{
    const cl=clients.filter(c=>c.leadOrigin===o && c.stage==='fechado').length;
    const ls=clients.filter(c=>c.leadOrigin===o && c.stage==='perdido').length;
    return (cl+ls)>0 ? Math.round(cl/(cl+ls)*100) : 0;
  });
  CHARTS.convOrigem = new Chart(document.getElementById('chartConvOrigem'), {
    type:'doughnut',
    data:{ labels:origins, datasets:[{data:convOrigem.map((v,i)=>clients.filter(c=>c.leadOrigin===origins[i]).length), backgroundColor:['#131E29','#3385B2','#B9D9EB','#8B5CF6','#F79009','#12B76A','#8B6F3E']}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{usePointStyle:true, boxWidth:8, font:{size:11}}}}}
  });
}

function toggleTaskDone(id){
  const t=DB.tasks.find(x=>x.id===id);
  t.status = t.status==='done' ? 'todo' : 'done';
  persist(); renderTasks(); renderNav();
}
function setTaskStatus(id,status){
  const t=DB.tasks.find(x=>x.id===id); t.status=status; persist(); renderTasks();
}
function rescheduleTask(id){
  const t=DB.tasks.find(x=>x.id===id);
  t.dueDate = todayISO(3);
  persist(); renderTasks(); toast('Tarefa reagendada para '+fmtDate(t.dueDate));
}

   ========================================================= */
function setAgendaMode(m){ AGENDA_MODE=m; renderAgenda(); }
function renderAgenda(){
  document.getElementById('agendaSeg').innerHTML = ['day','week','month'].map(m=>
    `<button class="seg-btn ${AGENDA_MODE===m?'active':''}" onclick="setAgendaMode('${m}')">${m==='day'?'Dia':m==='week'?'Semana':'Mês'}</button>`
  ).join('');

  const range = AGENDA_MODE==='day'?1:AGENDA_MODE==='week'?7:30;
  const items = [];
  tasksInScope().forEach(t=>{
    const d = daysUntil(t.dueDate);
    if(d>=0 && d<range){
      const c = DB.clients.find(x=>x.id===t.clientId);
      items.push({date:t.dueDate, time: t.priority==='Alta'?'09:00':t.priority==='Média'?'11:30':'15:00', title:t.title, sub:(c?c.name+' · ':'')+t.type, kind:'task', ref:t.id});
    }
  });
  clientsInScope().forEach(c=>{
    if(c.renewalDate){
      const d = daysUntil(c.renewalDate);
      if(d>=0 && d<range){
        items.push({date:c.renewalDate, time:'10:00', title:'Renovação: '+c.name, sub:c.insurer+' · '+c.product, kind:'renewal', ref:c.id});
      }
    }
  });
  items.sort((a,b)=> a.date===b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date));

  const grouped = {};
  items.forEach(it=>{ (grouped[it.date] = grouped[it.date]||[]).push(it); });
  const dates = Object.keys(grouped).sort();

  const body = document.getElementById('agendaBody');
  if(!dates.length){
    body.innerHTML = emptyState('Nada por aqui', 'Sem compromissos, retornos ou renovações neste período.');
    return;
  }
  body.innerHTML = dates.map(date=>{
    const label = date===todayISO() ? 'Hoje · '+fmtDate(date) : fmtDate(date)+' · '+new Date(date).toLocaleDateString('pt-BR',{weekday:'long'});
    return `
      <div class="agenda-day-group">
        <div class="agenda-day-label">${label}</div>
        ${grouped[date].map(it=>`
          <div class="agenda-item" onclick="${it.kind==='task'?'':`openClientModal('${it.ref}')`}" style="cursor:${it.kind==='renewal'?'pointer':'default'};">
            <div class="agenda-time">${it.time}</div>
            <div class="agenda-info">
              <div class="t">${it.kind==='renewal'?'🔄 ':'✅ '}${it.title}</div>
              <div class="s">${it.sub}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function emptyState(title,sub){
  return `<div class="empty-state">${ICONS.empty}<div class="e-title">${title}</div><div class="e-sub">${sub}</div></div>`;
}

function saveGroupPaymentLink(groupId){
  const g = groupById(groupId);
  const input = document.getElementById('pay_link_'+groupId);
  g.paymentLink = input.value.trim();
  persistGroups();
  toast('Link de cobrança salvo');
}
function chargeGroup(groupId){
  const g = groupById(groupId);
  if(!g.paymentLink){ toast('Cadastre o link de pagamento (paga.me) antes de cobrar'); return; }
  window.open(g.paymentLink, '_blank');
}
function registerGroupPayment(groupId){
  const g = groupById(groupId);
  g.subscriptionActiveUntil = todayISO(SUBSCRIPTION_DAYS);
  g.paymentHistory = g.paymentHistory || [];
  g.paymentHistory.unshift({date:todayISO(), note:`Pagamento confirmado — ciclo renovado por ${SUBSCRIPTION_DAYS} dias.`});
  persistGroups();
  renderAdminTabBody();
  renderBanners();
  toast(`Assinatura de ${g.name} renovada até ${fmtDate(g.subscriptionActiveUntil)}`);
}

async function saveGroup(isNew, groupId){
  const name = document.getElementById('gf_name').value.trim();
  if(!name){ toast('Informe o nome da corretora'); return; }
  if(isNew){
    DB.groups.push({ id:uid('grp'), name, createdAt:todayISO(), subscriptionActiveUntil:todayISO(SUBSCRIPTION_DAYS), paymentLink:'', paymentHistory:[] });
    toast('Corretora criada com sucesso');
  }else{
    const g = groupById(groupId);
    g.name = name;
    toast('Corretora atualizada');
  }
  await persistGroups();
  closeModal();
  renderAdminTabBody();
}

function deleteGroup(groupId){
  const hasUsers = DB.users.some(u=>u.groupId===groupId);
  if(hasUsers){ toast('Remova ou realoque os usuários dessa corretora antes de excluí-la'); return; }
  DB.groups = DB.groups.filter(g=>g.id!==groupId);
  persistGroups();
  renderAdminTabBody();
  toast('Corretora excluída');
}

function toggleUserGroupField(){
  const roleLabel = document.getElementById('uf_role').value;
  const field = document.getElementById('uf_group_field');
  field.style.display = roleLabel==='Administrador' ? 'none' : '';
}

async function saveUser(isNew, userId){
  const name = document.getElementById('uf_name').value.trim();
  const email = document.getElementById('uf_email').value.trim().toLowerCase();
  const pass = document.getElementById('uf_pass').value;
  const roleLabel = document.getElementById('uf_role').value;
  const role = ROLES.find(r=>r.label===roleLabel).id;
  const groupId = role==='admin' ? null : document.getElementById('uf_group').value;

  if(!name || !email){ toast('Preencha nome e e-mail'); return; }
  if(isNew && !pass){ toast('Defina uma senha para o novo usuário'); return; }
  if(role==='corretor' && !groupId){ toast('Selecione a corretora do usuário'); return; }
  const dupe = DB.users.find(x=>x.email.toLowerCase()===email && x.id!==userId);
  if(dupe){ toast('Já existe um usuário com esse e-mail'); return; }

  if(isNew){
    DB.users.unshift({ id:uid('usr'), name, email, password:pass, role, groupId, active:true, createdAt:todayISO() });
    toast('Usuário criado com sucesso');
  }else{
    const u = DB.users.find(x=>x.id===userId);
    u.name=name; u.email=email; u.role=role; u.groupId=groupId;
    if(pass) u.password = pass;
    if(CURRENT_USER.id===u.id) CURRENT_USER = u;
    toast('Usuário atualizado');
  }
  await persistUsers();
  closeModal();
  if(CURRENT_USER){ renderSidebarBrand(); renderSidebarFooter(); }
  renderAdminTabBody();
}

function toggleUserActive(id){
  const u = DB.users.find(x=>x.id===id);
  if(u.id===CURRENT_USER.id){ toast('Você não pode desativar o próprio usuário'); return; }
  u.active = !u.active;
  persistUsers();
  renderAdminTabBody();
  toast(u.active?'Usuário ativado':'Usuário desativado');
}

function deleteUser(id){
  if(id===CURRENT_USER.id){ toast('Você não pode excluir o próprio usuário'); return; }
  DB.users = DB.users.filter(x=>x.id!==id);
  persistUsers();
  renderAdminTabBody();
  toast('Usuário excluído');
}

/* =========================================================
   IMPORTAÇÃO / EXPORTAÇÃO DE PLANILHA
   ========================================================= */
const SHEET_HEADERS = [
  'Nome Completo','CPF/CNPJ','Telefone','WhatsApp','E-mail','Data de Nascimento','Profissão','Cidade',
  'Origem do Lead','Responsável Comercial','Seguradora','Produto','Número da Apólice','Prêmio',
  'Data de Vigência','Data de Renovação','Etapa','Observações'
];
const STAGE_NAME_TO_ID = STAGES.reduce((acc,s)=>{ acc[s.name.toLowerCase()]=s.id; return acc; }, {});

function clientToRow(c){
  return {
    'Nome Completo': c.name, 'CPF/CNPJ': c.cpfCnpj, 'Telefone': c.phone, 'WhatsApp': c.whatsapp, 'E-mail': c.email,
    'Data de Nascimento': c.birthDate, 'Profissão': c.profession, 'Cidade': c.city, 'Origem do Lead': c.leadOrigin,
    'Responsável Comercial': c.owner, 'Seguradora': c.insurer, 'Produto': c.product, 'Número da Apólice': c.policyNumber,
    'Prêmio': c.premium, 'Data de Vigência': c.effectiveDate, 'Data de Renovação': c.renewalDate,
    'Etapa': stageOf(c.stage) ? stageOf(c.stage).name : c.stage, 'Observações': (c.history&&c.history[0]) ? c.history[0].text : ''
  };
}

          <div class="io-icon">${ICONS.upload}</div>
          <div class="io-text"><div class="io-title">Enviar minha planilha</div><div class="io-sub">Envie o arquivo já preenchido (.xlsx, .xls ou .csv)</div></div>

function handleImportFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const isAdmin = CURRENT_USER.role==='admin';
  const groupSel = document.getElementById('imp_group');
  const targetGroupId = isAdmin ? (groupSel ? groupSel.value : ADMIN_GROUP_FILTER) : CURRENT_USER.groupId;
  if(!targetGroupId){ toast('Selecione a corretora antes de importar'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:false});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      let count = 0;
      rows.forEach(row=>{
        const name = (row['Nome Completo']||row['Nome']||'').toString().trim();
        if(!name) return;
        const stageRaw = (row['Etapa']||row['Status']||'').toString().trim().toLowerCase();
        const stage = STAGE_NAME_TO_ID[stageRaw] || 'lead';
        const groupOwners = ownersForGroup(targetGroupId);
        const c = blankClient();
        Object.assign(c, {
          groupId: targetGroupId,
          name,
          cpfCnpj: (row['CPF/CNPJ']||'').toString(),
          phone: (row['Telefone']||'').toString(),
          whatsapp: (row['WhatsApp']||'').toString().replace(/\D/g,''),
          email: (row['E-mail']||row['Email']||'').toString(),
          birthDate: (row['Data de Nascimento']||'').toString(),
          profession: (row['Profissão']||'').toString(),
          city: (row['Cidade']||'').toString(),
          leadOrigin: (row['Origem do Lead']||LEAD_ORIGINS[0]).toString(),
          owner: (row['Responsável Comercial']||groupOwners[0]||'').toString(),
          insurer: (row['Seguradora']||INSURERS[0]).toString(),
          product: (row['Produto']||PRODUCTS[0]).toString(),
          policyNumber: (row['Número da Apólice']||'').toString(),
          premium: parseFloat(row['Prêmio'])||0,
          effectiveDate: (row['Data de Vigência']||'').toString(),
          renewalDate: (row['Data de Renovação']||'').toString(),
          stage,
        });
        c.history = [{date:todayISO(), text: row['Observações'] ? row['Observações'].toString() : 'Cliente importado via planilha.'}];
        DB.clients.unshift(c);
        count++;
      });
      persist();
      renderNav();
      renderCurrentView();
      closeModal();
      toast(`${count} cliente(s) importado(s) com sucesso`);
    }catch(err){
      console.error(err);
      toast('Não foi possível ler a planilha. Verifique o formato.');
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

let DRAGGED_ID=null;
function onCardDragStart(e,id){ DRAGGED_ID=id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onColDragOver(e,col){ e.preventDefault(); col.classList.add('drag-over'); }
function onColDrop(e,stageId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const c = DB.clients.find(x=>x.id===DRAGGED_ID);
  if(c && c.stage!==stageId){
    c.stage = stageId;
    if(stageId==='fechado' && !c.closedDate) c.closedDate = todayISO();
    if(stageId==='perdido' && !c.closedDate) c.closedDate = todayISO();
    c.history.unshift({date:todayISO(), text:`Movido para etapa "${stageOf(stageId).name}".`});
    persist();
    renderKanban();
    renderNav();
    toast(`${c.name} movido para ${stageOf(stageId).name}`);
  }
}
