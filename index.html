function handleProfilePhoto(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 3*1024*1024){ toast('Escolha uma imagem de até 3MB'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const size = 200;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      CURRENT_USER.photo = canvas.toDataURL('image/jpeg', 0.85);
      renderMyProfileModal();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeProfilePhoto(){
  CURRENT_USER.photo = '';
  renderMyProfileModal();
}

  const u = DB.users.find(x=>x.id===CURRENT_USER.id);
  u.name = name; u.email = email; u.photo = CURRENT_USER.photo || '';
  if(pass) u.password = pass;
  CURRENT_USER = u;

  toast('Dados atualizados');
}

        <button class="btn btn-primary" onclick="saveUser(${isNew}, '${isNew?'':u.id}')">${ICONS.check} ${isNew?'Criar Usuário':'Salvar Alterações'}</button>
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('uf_role').addEventListener('change', toggleUserGroupField);
  toggleUserGroupField();
}
function toggleUserGroupField(){
  const roleLabel = document.getElementById('uf_role').value;
  const field = document.getElementById('uf_group_field');
  field.style.display = roleLabel==='Administrador' ? 'none' : '';
}

async function saveUser(isNew, userId){
  const name = document.getElementById('uf_name').value.trim();
  const email = document.getElementById('uf_email').value.trim().toLowerCase();
  const pass = document.getElementById('uf_pass').value;
  const roleLabel = document.getElementById('uf_role').value;
  const role = ROLES.find(r=>r.label===roleLabel).id;
  const groupId = role==='admin' ? null : document.getElementById('uf_group').value;

  if(!name || !email){ toast('Preencha nome e e-mail'); return; }
  if(isNew && !pass){ toast('Defina uma senha para o novo usuário'); return; }
  if(role!=='admin' && !groupId){ toast('Selecione a corretora do usuário'); return; }
  const dupe = DB.users.find(x=>x.email.toLowerCase()===email && x.id!==userId);
  if(dupe){ toast('Já existe um usuário com esse e-mail'); return; }

  if(isNew){
    DB.users.unshift({ id:uid('usr'), name, email, password:pass, role, groupId, active:true, createdAt:todayISO() });
    toast('Usuário criado com sucesso');
  }else{
    const u = DB.users.find(x=>x.id===userId);
    u.name=name; u.email=email; u.role=role; u.groupId=groupId;
    if(pass) u.password = pass;
    if(CURRENT_USER.id===u.id) CURRENT_USER = u;
    toast('Usuário atualizado');
  }
  await persistUsers();
  closeModal();
  if(CURRENT_USER){ renderSidebarBrand(); renderSidebarFooter(); }
  renderAdminTabBody();
}

function toggleUserActive(id){
  const u = DB.users.find(x=>x.id===id);
  if(u.id===CURRENT_USER.id){ toast('Você não pode desativar o próprio usuário'); return; }
  if(CURRENT_USER.role==='gestor' && (u.groupId!==CURRENT_USER.groupId || u.role!=='corretor')){ toast('Você só pode gerenciar corretores da sua equipe'); return; }
  u.active = !u.active;
  persistUsers();
  renderCurrentView();
  toast(u.active?'Usuário ativado':'Usuário desativado');
}

function deleteUser(id){
  if(id===CURRENT_USER.id){ toast('Você não pode excluir o próprio usuário'); return; }
  const u = DB.users.find(x=>x.id===id);
  if(CURRENT_USER.role==='gestor' && (u.groupId!==CURRENT_USER.groupId || u.role!=='corretor')){ toast('Você só pode gerenciar corretores da sua equipe'); return; }
  DB.users = DB.users.filter(x=>x.id!==id);
  persistUsers();
  renderCurrentView();
  toast('Usuário excluído');
}

/* =========================================================
   IMPORTAÇÃO / EXPORTAÇÃO DE PLANILHA
   ========================================================= */
const SHEET_HEADERS = [
  'Nome Completo','CPF/CNPJ','Telefone','WhatsApp','E-mail','Data de Nascimento','Profissão','Cidade',
  'Origem do Lead','Responsável Comercial','Seguradora','Produto','Número da Apólice','Prêmio',
  'Data de Vigência','Data de Renovação','Etapa','Observações'
];
const STAGE_NAME_TO_ID = STAGES.reduce((acc,s)=>{ acc[s.name.toLowerCase()]=s.id; return acc; }, {});

function clientToRow(c){
  return {
    'Nome Completo': c.name, 'CPF/CNPJ': c.cpfCnpj, 'Telefone': c.phone, 'WhatsApp': c.whatsapp, 'E-mail': c.email,
    'Data de Nascimento': c.birthDate, 'Profissão': c.profession, 'Cidade': c.city, 'Origem do Lead': c.leadOrigin,
    'Responsável Comercial': c.owner, 'Seguradora': c.insurer, 'Produto': c.product, 'Número da Apólice': c.policyNumber,
    'Prêmio': c.premium, 'Data de Vigência': c.effectiveDate, 'Data de Renovação': c.renewalDate,
    'Etapa': stageOf(c.stage) ? stageOf(c.stage).name : c.stage, 'Observações': (c.history&&c.history[0]) ? c.history[0].text : ''
  };
}

function downloadTemplate(){

    'Nome Completo':'João da Silva', 'CPF/CNPJ':'123.456.789-00', 'Telefone':'(61) 99999-0000', 'WhatsApp':'5561999990000',

    'Origem do Lead':'Indicação', 'Responsável Comercial':'Marina Costa', 'Seguradora':'Porto Seguro', 'Produto':'Auto',
    'Número da Apólice':'', 'Prêmio':2400, 'Data de Vigência':'', 'Data de Renovação':'',
    'Etapa':'Lead Recebido', 'Observações':'Cliente veio por indicação de outro segurado.'
  };
  const ws = XLSX.utils.json_to_sheet([example], {header:SHEET_HEADERS});

function exportSpreadsheet(){
  const rows = filteredClients().map(clientToRow);
  const ws = XLSX.utils.json_to_sheet(rows, {header:SHEET_HEADERS});
  ws['!cols'] = SHEET_HEADERS.map(()=>({wch:20}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Clientes');
  XLSX.writeFile(wb, 'clientes-cockpit-crm.xlsx');

}

function openImportModal(){
  const isAdmin = CURRENT_USER.role==='admin';
  const groupOptions = isAdmin ? DB.groups.map(g=>`<option value="${g.id}" ${ADMIN_GROUP_FILTER===g.id?'selected':''}>${g.name}</option>`).join('') : '';
  const html = `
    <div class="modal modal-small">
      <div class="modal-head">
        <div class="mh-info"><div class="mh-name">Importar clientes</div><div class="mh-sub">Baixe o modelo ou envie sua planilha preenchida</div></div>
        <button class="modal-close" onclick="closeModal()">${ICONS.close}</button>
      </div>
      <div class="modal-body" style="padding:20px 22px;">
        ${isAdmin ? `
        <div class="field full" style="margin-bottom:14px;">
          <label>Importar para qual corretora?</label>
          <select id="imp_group">${groupOptions}</select>
        </div>` : ''}
        <div class="import-option" onclick="downloadTemplate()">
          <div class="io-text"><div class="io-title">Baixar modelo de planilha</div><div class="io-sub">Preencha o arquivo .xlsx com os dados dos seus clientes</div></div>
        </div>
        <div class="import-option" onclick="document.getElementById('importFileInput').click()">
          <div class="io-text"><div class="io-title">Enviar minha planilha</div><div class="io-sub">Envie o arquivo já preenchido (.xlsx, .xls ou .csv)</div></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Fechar</button>
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function handleImportFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const isAdmin = CURRENT_USER.role==='admin';
  const groupSel = document.getElementById('imp_group');
  const targetGroupId = isAdmin ? (groupSel ? groupSel.value : ADMIN_GROUP_FILTER) : CURRENT_USER.groupId;
  if(!targetGroupId){ toast('Selecione a corretora antes de importar'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:false});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      let count = 0;
      rows.forEach(row=>{
        const name = (row['Nome Completo']||row['Nome']||'').toString().trim();
        if(!name) return;
        const stageRaw = (row['Etapa']||row['Status']||'').toString().trim().toLowerCase();
        const stage = STAGE_NAME_TO_ID[stageRaw] || 'lead';
        const groupOwners = ownersForGroup(targetGroupId);
        const c = blankClient();
        Object.assign(c, {
          groupId: targetGroupId,
          name,
          cpfCnpj: (row['CPF/CNPJ']||'').toString(),
          phone: (row['Telefone']||'').toString(),
          whatsapp: (row['WhatsApp']||'').toString().replace(/\D/g,''),
          email: (row['E-mail']||row['Email']||'').toString(),
          birthDate: (row['Data de Nascimento']||'').toString(),
          profession: (row['Profissão']||'').toString(),
          city: (row['Cidade']||'').toString(),
          leadOrigin: (row['Origem do Lead']||LEAD_ORIGINS[0]).toString(),
          owner: (row['Responsável Comercial']||groupOwners[0]||'').toString(),
          insurer: (row['Seguradora']||INSURERS[0]).toString(),
          product: (row['Produto']||PRODUCTS[0]).toString(),
          policyNumber: (row['Número da Apólice']||'').toString(),
          premium: parseFloat(row['Prêmio'])||0,
          effectiveDate: (row['Data de Vigência']||'').toString(),
          renewalDate: (row['Data de Renovação']||'').toString(),
          stage,
        });
        c.history = [{date:todayISO(), text: row['Observações'] ? row['Observações'].toString() : 'Cliente importado via planilha.'}];
        DB.clients.unshift(c);
        count++;
      });
      persist();
      renderNav();
      renderCurrentView();
      closeModal();
      toast(`${count} cliente(s) importado(s) com sucesso`);
    }catch(err){
      console.error(err);
      toast('Não foi possível ler a planilha. Verifique o formato.');
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

async function checkSupabaseConnection(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=key&limit=1`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    return res.ok;
  }catch(e){ return false; }
}

async function initApp(){
  buildViewsShell();
  const connected = await checkSupabaseConnection();
  if(!connected){
    document.getElementById('loginScreen').style.display='flex';
    const card = document.getElementById('loginCard');
    card.classList.remove('booting');
    card.innerHTML = `
      <div style="text-align:center;padding:10px;">
        <div style="font-weight:800;font-size:15px;color:var(--danger);margin-bottom:10px;">Não foi possível conectar ao banco de dados</div>
        <div style="font-size:12.5px;color:var(--text-muted);line-height:1.6;">Verifique a URL e a chave do Supabase configuradas no sistema, e se a tabela <code>cockpit_storage</code> foi criada corretamente.</div>
      </div>
    `;
    return;
  }
  await loadDB();
  const hasSession = await trySavedSession();
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{
    if(e.target.id==='modalOverlay') closeModal();
  });
  if(hasSession){ enterApp(); }
  else{ renderLogin(SESSION_EXPIRED_MSG); }
}
initApp();

let DRAGGED_ID=null;
function onCardDragStart(e,id){ DRAGGED_ID=id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onColDragOver(e,col){ e.preventDefault(); col.classList.add('drag-over'); }
function onColDrop(e,stageId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const c = DB.clients.find(x=>x.id===DRAGGED_ID);
  if(c && c.stage!==stageId){
    c.stage = stageId;
    if(stageId==='fechado' && !c.closedDate) c.closedDate = todayISO();
    if(stageId==='perdido' && !c.closedDate) c.closedDate = todayISO();
    c.history.unshift({date:todayISO(), text:`Movido para etapa "${stageOf(stageId).name}".`});
    persist();
    renderKanban();
    renderNav();
    toast(`${c.name} movido para ${stageOf(stageId).name}`);
  }
}
